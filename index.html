<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ds Max 360 Render Viewer</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        #panorama {
            width: 100%;
            height: 100vh; /* Tam ekran yükseklik */
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
    pannellum.viewer('panorama', {
        "type": "equirectangular",
        "panorama": "https://photos.app.goo.gl/tkHr2tEgmbjm3iSa7", // BURAYA KENDİ DOSYA ADINIZI YAZIN
        "autoLoad": true,               // Tıklamaya gerek kalmadan otomatik yükler
        "autoRotate": -2,               // Otomatik yavaşça döner (kapatmak için 0 yapın)
        "compass": true                 // Pusula gösterir
    });
</script>

</body>
</html>
